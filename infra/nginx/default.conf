map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

resolver 127.0.0.11 valid=10s ipv6=off;

upstream api_upstream {
  zone api_upstream 64k;
  server api:8000 resolve;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /health {
    proxy_pass http://api_upstream/health;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, x-user-id, Authorization" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /api/ {
    proxy_pass http://api_upstream/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;

    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    client_max_body_size 50m;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, x-user-id, Authorization" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /static/ {
    proxy_pass http://api_upstream/static/;
    proxy_set_header Host $host;

    add_header Access-Control-Allow-Origin * always;
  }

  location = /legal {
    proxy_pass http://api_upstream/legal;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /legal/ {
    proxy_pass http://api_upstream/legal/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
