<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c15f3e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0D1123",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .radio-checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden border-x border-slate-200 dark:border-slate-800">
<!-- TopAppBar -->
<header class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-white flex size-10 items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">TUSBINA</h2>
</header>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-white text-base font-semibold leading-normal">Podcast Wizard</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal">Adım 2 / 3</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-800 h-2 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 66%;"></div>
</div>
</div>
<!-- Main Title -->
<h1 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight px-4 pt-5">Ses ve Format Seç</h1>
<!-- Voice Selection Section -->
<section class="mt-6">
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2">Ses Seçimi</h3>
<div class="flex flex-col gap-3 p-4">
<!-- Option 1 -->
<label class="group relative flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 p-4 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input checked="" class="peer hidden" name="voice_selection" type="radio"/>
<div class="flex size-5 shrink-0 items-center justify-center rounded-full border-2 border-slate-300 dark:border-slate-600 peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="size-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Dr. Arda (Eril)</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Akademik ve otoriter ses tonu</p>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100">volume_up</span>
</label>
<!-- Option 2 -->
<label class="group relative flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 p-4 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="peer hidden" name="voice_selection" type="radio"/>
<div class="flex size-5 shrink-0 items-center justify-center rounded-full border-2 border-slate-300 dark:border-slate-600 peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="size-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Dr. Selin (Dişil)</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Anlaşılır ve yumuşak ses tonu</p>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100">volume_up</span>
</label>
</div>
</section>
<!-- Format Selection Section -->
<section class="mt-4 pb-24">
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2">Podcast Formatı</h3>
<div class="grid grid-cols-1 gap-3 p-4">
<!-- Format Option 1 -->
<label class="group relative flex items-start gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 p-4 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="peer hidden" name="format_selection" type="radio"/>
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">short_text</span>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Özet</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Temel noktaları içeren 5-7 dakikalık hızlı bakış.</p>
</div>
</label>
<!-- Format Option 2 -->
<label class="group relative flex items-start gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 p-4 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input checked="" class="peer hidden" name="format_selection" type="radio"/>
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">article</span>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Detaylı Anlatım</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Tüm detayları ve örnekleri kapsayan derinlemesine analiz.</p>
</div>
</label>
<!-- Format Option 3 -->
<label class="group relative flex items-start gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 p-4 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="peer hidden" name="format_selection" type="radio"/>
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">quiz</span>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Soru-Cevap</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Konuyu mülakat tarzında pekiştiren interaktif format.</p>
</div>
</label>
</div>
</section>
<!-- Fixed Bottom CTA -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md p-4 bg-background-light dark:bg-background-dark/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 z-50">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-[0.98]">
                Devam Et
            </button>
</div>
</div>
</body></html>
