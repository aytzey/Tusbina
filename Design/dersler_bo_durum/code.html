<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c15f3e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0D1123", // Updated to requested dark color
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="flex items-center justify-between px-6 py-4 border-b border-primary/10">
<button class="flex items-center justify-center text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Dersler</h1>
<div class="w-6"></div> <!-- Spacer for centering title -->
</header>
<!-- Main Content: Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<div class="mb-8 relative">
<!-- Illustration Area -->
<div class="w-64 h-64 rounded-full bg-primary/5 flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent opacity-40"></div>
<span class="material-symbols-outlined text-primary text-8xl opacity-80" style="font-variation-settings: 'FILL' 1">auto_stories</span>
</div>
<!-- Decorative accents -->
<div class="absolute -top-2 -right-2 w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl">search</span>
</div>
</div>
<div class="max-w-sm space-y-4">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-50">Henüz bir dersin yok mu?</h2>
<p class="text-slate-600 dark:text-slate-400 leading-relaxed">
                TUS yolculuğuna başlamak için katalogdan sana uygun dersleri seçebilirsin.
            </p>
</div>
<div class="mt-10 w-full max-w-xs">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">explore</span>
                Dersleri Keşfet
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 w-full border-t border-primary/10 bg-background-light dark:bg-background-dark/95 backdrop-blur-md px-4 pb-6 pt-3">
<div class="flex items-center justify-between max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-xs font-medium">Ana Sayfa</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">book_2</span>
<span class="text-xs font-bold">Dersler</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">assignment</span>
<span class="text-xs font-medium">Denemeler</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="text-xs font-medium">Profil</span>
</a>
</div>
</nav>
