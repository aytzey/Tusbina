<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c15f3e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0D1123",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-2xl mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- TopAppBar -->
<header class="flex items-center p-4 pb-2 justify-between">
<button aria-label="Geri" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">TUSBINA</h2>
</header>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Oluşturma Sihirbazı</p>
<p class="text-primary text-sm font-bold leading-normal">Adım 3 / 3</p>
</div>
<div class="rounded-full bg-primary/20 h-2 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 100%;"></div>
</div>
</div>
<!-- Section Title -->
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight px-4 pb-2 pt-5">Önizleme ve Oluştur</h3>
<!-- Podcast Name Input -->
<div class="flex flex-col gap-4 px-4 py-3">
<label class="flex flex-col w-full">
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Podcast Adı</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/30 bg-white dark:bg-primary/5 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Podcastiniz için bir başlık girin..." type="text" value="Kardiyoloji: Hipertansiyon Vaka İncelemesi"/>
</label>
</div>
<!-- Summary Card -->
<div class="px-4 py-4">
<div class="bg-primary/10 border border-primary/20 rounded-xl p-4 flex flex-col gap-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">analytics</span>
<h4 class="font-bold text-slate-900 dark:text-slate-100">Yapılandırma Özeti</h4>
</div>
<div class="grid grid-cols-3 gap-2">
<div class="flex flex-col items-center p-3 bg-white dark:bg-background-dark rounded-lg border border-primary/10 text-center">
<span class="text-xs text-slate-500 uppercase font-semibold">Dosyalar</span>
<span class="text-primary font-bold">4 PDF</span>
</div>
<div class="flex flex-col items-center p-3 bg-white dark:bg-background-dark rounded-lg border border-primary/10 text-center">
<span class="text-xs text-slate-500 uppercase font-semibold">Ses</span>
<span class="text-primary font-bold">Can</span>
</div>
<div class="flex flex-col items-center p-3 bg-white dark:bg-background-dark rounded-lg border border-primary/10 text-center">
<span class="text-xs text-slate-500 uppercase font-semibold">Format</span>
<span class="text-primary font-bold">Diyalog</span>
</div>
</div>
</div>
</div>
<!-- Section List (Bölüm Listesi) -->
<div class="px-4 pt-4 pb-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] mb-4">Bölüm Listesi</h3>
<div class="space-y-3">
<!-- Section Item 1 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-primary/5 rounded-xl border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">segment</span>
<span class="text-slate-900 dark:text-slate-100 font-medium">Bölüm 1: Giriş ve Genel Bakış</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Section Item 2 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-primary/5 rounded-xl border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">segment</span>
<span class="text-slate-900 dark:text-slate-100 font-medium">Bölüm 2: Klinik Bulgular</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Section Item 3 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-primary/5 rounded-xl border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">segment</span>
<span class="text-slate-900 dark:text-slate-100 font-medium">Bölüm 3: Tanısal Testler</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Section Item 4 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-primary/5 rounded-xl border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-slate-400">segment</span>
<span class="text-slate-500 font-medium">Bölüm 4: Tedavi Protokolleri (Pasif)</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</div>
<!-- Floating Spacer for bottom CTA -->
<div class="h-32"></div>
<!-- Primary CTA Button Container -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-95">
<span class="material-symbols-outlined">auto_awesome</span>
                    Podcast Oluştur
                </button>
</div>
</div>
</div>
</body></html>
